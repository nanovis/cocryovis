services:
  web:
    networks:
      - cocryovis-network

  nginx:
    image: nginx:alpine
    user: root
    container_name: nginx-proxy
    ports:
      - "443:443"
    volumes:
      - ${NGINX_CONF_PATH:-./nginx.conf}:/etc/nginx/nginx.conf
      - ${CERT_PATH:-./ssl}:/etc/nginx/ssl
    networks:
      - cocryovis-network
    depends_on:
      - web
    restart: unless-stopped

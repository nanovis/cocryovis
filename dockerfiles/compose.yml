services:
  web:
    build:
      context: ../
      dockerfile: dockerfiles/Dockerfile
      args:
        CUDA_ARCHITECTURES: ${CUDA_ARCHITECTURES:-native}
        DATABASE_URL: file:/app/server/database/db.sqlite
    image: ${IMAGE_NAME:-cocryovis:latest}
    container_name: volweb-app
    ports:
      - "8080:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NODE_ENV=production
      - SESSIONS_PATH=/app/server/database/db.sessions
      - SESSION_SECRET=${SESSION_SECRET:-notsecret}
      - ALLOW_INSECURE_COOKIES=${ALLOW_INSECURE_COOKIES:-false}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - app_dbdata:/app/server/database
      - app_filedata:/app/server/data
      - app_logdata:/app/server/logs
      - app_modulecache:/app/server/.module-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "cd server && . modules/imod/IMOD/IMOD-linux.sh && conda run --no-capture-output -n volweb npm run start:prod -- --port 8080 --host 0.0.0.0 --demoProject 13"
      ]

volumes:
  app_dbdata:
  app_filedata:
  app_logdata:
  app_modulecache:

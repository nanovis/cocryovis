    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
                email:
                  example: email@example.com
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                password:
                  type: string
                  minLength: 6
              required:
                - username
                - name
                - email
                - password
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/__schema10"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/__schema11"
        "404": &a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/__schema11"
        "500": *a1

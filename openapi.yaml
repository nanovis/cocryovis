openapi: 3.1.0
info:
  title: My API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
paths:
  /register:
    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
                email:
                  example: email@example.com
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                password:
                  type: string
                  minLength: 6
              required:
                - username
                - name
                - email
                - password
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                  password:
                    type: string
                required:
                  - username
                  - password
                additionalProperties: false
        "401":
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
                required:
                  - name
                  - message
                additionalProperties: false
        "404": &a1
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
                required:
                  - name
                  - message
                additionalProperties: false
        "500": *a1
  /login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  username:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                    format: email
                    pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                required:
                  - id
                  - username
                  - name
                  - email
                additionalProperties: false
        "401":
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
                required:
                  - name
                  - message
                additionalProperties: false
        "404": *a1
        "500": *a1
  /logout:
    post:
      summary: Logs the user out
      responses:
        "204":
          description: User logged out
        "404": *a1
        "500": *a1
  /getLoggedUserData:
    get:
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  username:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                    format: email
                    pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                required:
                  - id
                  - username
                  - name
                  - email
                additionalProperties: false
        "401":
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
                required:
                  - name
                  - message
                additionalProperties: false
        "404": *a1
        "500": *a1
  /users:
    get:
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                    username:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
                      format: email
                      pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                  required:
                    - id
                    - username
                    - name
                    - email
                  additionalProperties: false
        "404": *a1
        "500": *a1
  /status:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskHistory:
                    type: array
                    items:
                      type: object
                      properties:
                        enqueuedTime:
                          type: string
                        startTime:
                          type: string
                        endTime:
                          type: string
                        id:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        taskType:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        taskStatus:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        userId:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        logFile:
                          anyOf:
                            - type: string
                            - type: "null"
                        volumeId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                        modelId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                        checkpointId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                      required:
                        - enqueuedTime
                        - startTime
                        - endTime
                        - id
                        - taskType
                        - taskStatus
                        - userId
                        - logFile
                        - volumeId
                        - modelId
                        - checkpointId
                      additionalProperties: false
                  cpuTaskQueue:
                    type: array
                    items:
                      type: object
                      properties:
                        enqueuedTime:
                          type: string
                        startTime:
                          type: string
                        endTime:
                          type: string
                        id:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        taskType:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        taskStatus:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        userId:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        logFile:
                          anyOf:
                            - type: string
                            - type: "null"
                        volumeId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                        modelId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                        checkpointId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                      required:
                        - enqueuedTime
                        - startTime
                        - endTime
                        - id
                        - taskType
                        - taskStatus
                        - userId
                        - logFile
                        - volumeId
                        - modelId
                        - checkpointId
                      additionalProperties: false
                  gpuTaskQueue:
                    type: array
                    items:
                      type: object
                      properties:
                        enqueuedTime:
                          type: string
                        startTime:
                          type: string
                        endTime:
                          type: string
                        id:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        taskType:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        taskStatus:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        userId:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        logFile:
                          anyOf:
                            - type: string
                            - type: "null"
                        volumeId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                        modelId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                        checkpointId:
                          anyOf:
                            - type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            - type: "null"
                      required:
                        - enqueuedTime
                        - startTime
                        - endTime
                        - id
                        - taskType
                        - taskStatus
                        - userId
                        - logFile
                        - volumeId
                        - modelId
                        - checkpointId
                      additionalProperties: false
                required:
                  - taskHistory
                  - cpuTaskQueue
                  - gpuTaskQueue
                additionalProperties: false
        "404": *a1
        "500": *a1
  /user:
    put:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
                email:
                  example: email@example.com
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                password:
                  type: string
                  minLength: 6
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  username:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                    format: email
                    pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                required:
                  - id
                  - username
                  - name
                  - email
                additionalProperties: false
        "400":
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
                required:
                  - name
                  - message
                additionalProperties: false
        "404": *a1
        "500": *a1

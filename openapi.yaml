                          maximum: 9007199254740991
                      required:
                        - x
                        - y
                        - z
                    bytesPerVoxel:
                      type: number
                      enum:
                        - 1
                        - 2
                        - 4
                        - 8
                    usedBits:
                      type: number
                      enum:
                        - 8
                        - 16
                        - 32
                        - 64
                    skipBytes:
                      default: 0
                      type: number
                    isLittleEndian:
                      type: boolean
                    isSigned:
                      type: boolean
                    addValue:
                      default: 0
                      type: number
                  required:
                    - file
                    - size
                    - ratio
                    - bytesPerVoxel
                    - usedBits
                    - isLittleEndian
                    - isSigned
              required:

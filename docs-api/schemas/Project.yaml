Project:
  type: object
  required:
    - id
    - name
    - description
    - ownerId
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    ownerId:
      type: integer
      format: int64

ProjectDetails:
  type: object
  required:
    - id
    - name
    - description
    - ownerId
    - volumes
    - models
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    ownerId:
      type: integer
      format: int64
    volumes:
      type: array
      items:
        $ref: "./Volume.yaml#/VolumeDetails"
    models:
      type: array
      items:
        $ref: "./Model.yaml#/ModelDetails"
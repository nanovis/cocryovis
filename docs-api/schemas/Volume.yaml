Volume:
  type: object
  required:
    - id
    - name
    - description
    - creatorId
    - rawDataId
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    creatorId:
      type: integer
      format: int64
    rawDataId:
      type: integer
      format: int64
      nullable: true

VolumeDetails:
  type: object
  required:
    - id
    - name
    - description
    - creatorId
    - rawDataId
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    creatorId:
      type: integer
      format: int64
    rawDataId:
      type: integer
      format: int64
      nullable: true
    rawData:
      nullable: true
      $ref: "./RawData.yaml"
    sparseVolumes:
      type: array
      items:
        $ref: "./SparseLabelVolumeData.yaml"
    pseudoVolumes:
      type: array
      items:
        $ref: "./PseudoLabelVolumeData.yaml"
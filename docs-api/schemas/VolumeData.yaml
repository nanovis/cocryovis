type: object
required:
  - rawData
  - settings
properties:
  rawData:
    type: object
    required:
      - filename
      - data
    properties:
      filename:
        type: string
      data:
        type: string
        format: byte
  settings:
    type: object
    required:
      - filename
      - data
    properties:
      filename:
        type: string
      data:
        type: json
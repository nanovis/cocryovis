Result:
  type: object
  required:
    - id
    - folderPath
    - files
    - rawVolumeChannel
    - creatorId
    - checkpointId
    - volumeDataId
  properties:
    id:
      type: integer
      format: int64
    folderPath:
      type: string
      nullable: true
    files:
      type: string
      nullable: true
      description: List of files attached to result in stringified JSON format.
    rawVolumeChannel:
      type: integer
      nullable: true
    creatorId:
      type: integer
      format: int64
    checkpointId:
      type: integer
      format: int64
    volumeDataId:
      type: integer
      format: int64

ResultDetails:
  type: object
  required:
    - id
    - folderPath
    - files
    - rawVolumeChannel
    - creatorId
    - checkpointId
    - volumeDataId
    - checkpoint
  properties:
    id:
      type: integer
      format: int64
    folderPath:
      type: string
      nullable: true
    files:
      type: string
      nullable: true
      description: List of files attached to result in stringified JSON format.
    rawVolumeChannel:
      type: integer
      nullable: true
    creatorId:
      type: integer
      format: int64
    checkpointId:
      type: integer
      format: int64
    volumeDataId:
      type: integer
      format: int64
    checkpoint:
      nullable: true
      $ref: "./Checkpoint.yaml"
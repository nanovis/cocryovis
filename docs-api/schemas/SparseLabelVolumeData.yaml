type: object
required:
  - id
  - path
  - ownerId
  - rawFilePath
  - settings
properties:
  id:
    type: integer
    format: int64
  path:
    type: string
    nullable: true
  ownerId:
    type: integer
    format: int64
  rawFilePath:
    type: string
    nullable: true
  settings:
    type: string
    description: Volume settings in JSON format
    nullable: true
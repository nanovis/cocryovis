type: object
required:
  - config
  - settingsReference
  - files
properties:
  config:
    type: object
    required:
      - files
    properties:
      files:
        type: array
        items:
          type: string
  settingsReference:
    type: object
    required:
      - filename
      - data
    properties:
      filename:
        type: string
      data:
        type: json
        
  files:
    type: array
    items:
      type: object
      required:
        - filename
        - url
      properties:
        filename:
          type: string
        url:
          type: string
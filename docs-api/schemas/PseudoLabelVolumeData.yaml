type: object
required:
  - id
  - path
  - creatorId
  - rawFilePath
  - settings
  - originalLabelId
properties:
  id:
    type: integer
    format: int64
  path:
    type: string
    nullable: true
  creatorId:
    type: integer
    format: int64
  rawFilePath:
    type: string
    nullable: true
  settings:
    type: string
    description: Volume settings in JSON format
    nullable: true
  originalLabelId:
    type: integer
    format: int64
    nullable: true
Model:
  type: object
  required:
    - id
    - name
    - description
    - creatorId
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    creatorId:
      type: integer
      format: int64

ModelDetails:
  type: object
  required:
    - id
    - name
    - description
    - creatorId
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    creatorId:
      type: integer
      format: int64
    checkpoints:
      type: array
      items:
        $ref: "./Checkpoint.yaml"
    projects:
      type: array
      items:
        $ref: "./Project.yaml#/Project"
Model:
  type: object
  required:
    - id
    - name
    - description
    - ownerId
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    ownerId:
      type: integer
      format: int64

ModelDetails:
  type: object
  required:
    - id
    - name
    - description
    - ownerId
    - checkpoints
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    description:
      type: string
    ownerId:
      type: integer
      format: int64
    checkpoints:
      type: array
      items:
        $ref: "./Checkpoint.yaml"
openapi: 3.0.0
info:
  title: Vol-Web
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local Server

security:
  - express-session: []

paths:
  /login:
    post:
      summary: Login
      operationId: login
      tags:
        - User
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Login failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    
  /logout:
    post:
      summary: Logout
      operationId: logout
      tags:
        - User
      security: []
      responses:
        "204":
          description: Logout successful.

  /register:
    post:
      summary: Register
      operationId: register
      tags:
        - User
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              - name
              - email
              properties:
                username:
                  type: string
                password:
                  type: string
                name:
                  type: string
                email:
                  type: string
      responses:
        "200":
          description: Registration successful.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /projects:
    get:
      summary: List of all user projects
      operationId: getProjects
      tags:
        - Project
      responses:
        "200":
          description: An array of user's projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      summary: Create a new project
      operationId: createProject
      tags:
        - Project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    
    
  /project/{idProject}:
    get:
      summary: Detailed info about a project.
      operationId: getProjectById
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '200':
          description: Requested project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Deletes a project.
      operationId: deleteProject
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '204':
          description: Project successfuly deleted.
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /project/{idProject}/details:
    get:
      summary: Get project, and its volumes and models.
      operationId: projectDetails
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '201':
          description: Project details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetails"

  /project/{idProject}/deep-clone:
    post:
      summary: Clones the project together with volumes and models assigned to it.
      operationId: deepCloneProject
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '201':
          description: Cloned project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /project/{idProject}/volumes:
    get:
      summary: Get volumes assigned to project.
      operationId: getVolumesFromProject
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '200':
          description: Volumes assigned to project.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Volume"
    post:
      summary: Create a new volume
      operationId: createVolume
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created Volume.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volume'

  /project/{idProject}/volume/{idVolume}/clone:
    post:
      summary: Clones the volume.
      operationId: cloneVolume
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      responses:
        '201':
          description: Cloned Volume.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volume'

  /project/{idProject}/volume/{idVolume}:
    delete:
      summary: Removes volume from project. If volume is no longer referenced anywhere, it is deleted.
      operationId: removeVolumeFromProject
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      responses:
        '204':
          description: Volume successfuly removed from project.

  /volume/{idVolume}:
    get:
      summary: Fetch volume info.
      operationId: getVolumeById
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idVolume'
      responses:
        '200':
          description: Requested volume info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volume"

  /volume/{idVolume}/details:
    get:
      summary: Fetch volume info with the related raw volume, sparse label and pseudo label data.
      operationId: getVolumeDetails
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idVolume'
      responses:
        '200':
          description: Requested volume info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeDetails"

  /volume/{idVolume}/add-annotations:
    put:
      summary: Add annotations and convert them to sparse label volume
      operationId: addAnnotations
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idVolume'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                annotations:
                  type: object
                  description: A JSON object containing annotation data.

      responses:
        '201':
          description: Created sparse label volume.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SparseLabelVolumeData"

  /volume/{idVolume}/volumeData/{type}/from-files:
    post:
      summary: Create new Volume Data.
      operationId: createVolumeDataFromFiles
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      requestBody:
        required: true
        content:
          multipart/form-data:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: string
                      format: binary
                    description: Multiple files of type .zip, .raw, or .json
      responses:
        '201':
          description: Created Volume Data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeData"

  /volume/{idVolume}/volumeData/{type}/from-mrc-file:
    post:
      summary: Create new Volume Data from a MRC file.
      operationId: createVolumeDataFromFiles
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: A single .mrc file.
      responses:
        '201':
          description: Created Volume Data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawData"
  
  /volumeData/{type}/{idVolumeData}:
    get:
      summary: Fetch volume data info.
      operationId: getVolumeDataById
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: Requested volume data info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeData"
  
  /volumeData/{type}/{idVolumeData}/data:
    get:
      summary: Fetch raw file data.
      operationId: getVolumeDataRaw
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: A RAW file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /volumeData/{type}/{idVolumeData}/visualization-data:
    get:
      summary: Get Visualization Data
      operationId: getVisualizationData
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: Visualization Data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualizationData'
    
  /volumeData/{type}/{idVolumeData}/download-full:
    get:
      summary: Download volume data
      operationId: downloadVolumeData
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing all volume data files.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /volumeData/{type}/{idVolumeData}/download-raw-file:
    get:
      summary: Download raw volume file in volume data 
      operationId: downloadVolumeDataRawFile
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing raw file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string
  
  /volumeData/{type}/{idVolumeData}/download-settings-file:
    get:
      summary: Download settings file in volume data 
      operationId: downloadVolumeDataSettingsFile
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing settings file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /volumeData/{type}/{idVolumeData}/download-mrc-file:
    get:
      summary: Download mrc file in volume data 
      operationId: downloadVolumeDataMrcFile
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing MRC file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string
  
  /volume/{idVolume}/volumeData/{type}/{idVolumeData}:
    delete:
      summary: Removes volume data from volume. If volume data is no longer referenced anywhere else, it is deleted.
      operationId: removeVolumeDataFromProject
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/type'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '204':
          description: Volume data successfuly removed from volume.

  /project/{idProject}/models:
    get:
      summary: Get models assigned to project.
      operationId: getModelsFromProject
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '200':
          description: Models assigned to project.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Model'
    post:
      summary: Create a new model
      operationId: createModel
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created Model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'

  /project/{idProject}/model/{idModel}/clone:
    post:
      summary: Clones the model.
      operationId: cloneModel
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idModel'
      responses:
        '201':
          description: Cloned Model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'
  
  /project/{idProject}/model/{idModel}:
    delete:
      summary: Removes model from project. If model is no longer referenced anywhere, it is deleted.
      operationId: removeModelFromProject
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idModel'
      responses:
        '204':
          description: Model successfuly removed from project.

  /model/{idModel}:
    get:
      summary: Fetch Model info.
      operationId: getModelById
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idModel'
      responses:
        '200':
          description: Requested model info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"

  /model/{idModel}/details:
    get:
      summary: Fetch model info with the related checkpoints.
      operationId: getModelDetails
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idModel'
      responses:
        '200':
          description: Requested model info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelDetails"

  /model/{idModel}/checkpoints:
    get:
      summary: Get checkpoints assigned to Model
      operationId: getCheckpointsFromModel
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idModel'
      responses:
        '201':
          description: Created Checkpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoint'
    post:
      summary: Create new checkpoints
      operationId: createCheckpoints
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idModel'
      requestBody:
        required: true
        content:
         multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more files of type .ckpt
      responses:
        '201':
          description: Created Checkpoints.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Checkpoint'

  /model/{idModel}/checkpoint/{idCheckpoint}:
    delete:
      summary: Removes checkpoint from model. If model is no longer referenced anywhere, it is deleted.
      operationId: removeCheckpointFromModel
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idModel'
        - $ref: '#/components/parameters/idCheckpoint'
      responses:
        '204':
           description: Checkpoint successfuly removed from model.
             

  /checkpoint/{idCheckpoint}:
    get:
      summary: Fetch Checkpoint info.
      operationId: getCheckpointById
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idCheckpoint'
      responses:
        '200':
          description: Requested checkpoint info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkpoint"
                
  /checkpoint/{idCheckpoint}/download:
    get:
      summary: Download checkpoint file 
      operationId: downloadCheckpoint
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idCheckpoint'
      responses:
        '200':
          description: ZIP file containing checkpoint file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /result/{idResult}:
    get:
      summary: Fetch Result info.
      operationId: getResultById
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idResult'
      responses:
        '200':
          description: Requested Result info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /result/{idResult}/details:
    get:
      summary: Fetch Result info with the related checkpoint.
      operationId: getResultDetails
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idResult'
      responses:
        '200':
          description: Requested Result info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultDetails"

  /result/{idResult}/download:
    get:
      summary: Download result files
      operationId: downloadResult
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idResult'
      responses:
        '200':
          description: ZIP file containing result files.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  # /result/{idResult}/download/{fileIndex}:
  #   get:
  #     summary: Download a specific result file
  #     operationId: downloadResultFile
  #     tags:
  #       - Result
  #     parameters:
  #       - $ref: '#/components/parameters/idResult'
  #       - name: fileIndex
  #         in: path
  #         required: true
  #         schema:
  #             type: integer
  #     responses:
  #       '200':
  #         description: ZIP file containing a result file.
  #         content:
  #           application/zip:
  #             schema:
  #               $ref: '#/components/schemas/ZipFile'
  #         headers:
  #           Content-Disposition:
  #             description: Indicates that the response should be downloaded as an attachment.
  #             schema:
  #               type: string

  /result/{idResult}/visualization-data:
    get:
      summary: Get Visualization Data for Result
      operationId: getResultVisualizationData
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idResult'
      responses:
        '200':
          description: Visualization Data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualizationDataMultiVolume'

  /volume/{idVolume}/results:
    post:
      summary: Creates a result from files
      operationId: createResult
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idVolume'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                    description: Multiple .raw files
          application/json:
            schema:
              type: object
              properties:
                idCheckpoint:
                  type: integer
                idVolumeData:
                  type: integer
                volumeDescriptors:
                  type: array
                  items:
                    type: object
                    required:
                    - name
                    - index
                    properties:
                      name:
                        type: string
                      index:
                        type: integer
                      rawVolumeChannel:
                        type: boolean
      responses:
        '200':
            description: Created Result.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Result'
    get:
      summary: Fetches Results related to Volume together with their related checkpoint.
      operationId: getResultFromVolume
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idVolume'
      responses:
        '200':
            description: A list of Results.
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/ResultDetails'

  /volume/{idVolume}/result/{idResult}:
    delete:
      summary: Removes result from the volume. If the result is no longer referenced anywhere, it is deleted.
      operationId: removeResultFromVolume
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idResult'
      responses:
        '204':
            description: Result successfuly removed from volume.

  /ilastik-task-queue:
    get:
      summary: Retrieves current Ilastik task queue
      operationId: getIlastikTaskQueue
      tags:
        - Ilastik
      responses:
        '200':
            description: Ilastik task queue.
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - userId
                    - username
                    - volumeName
                    - volumeId
                  properties:
                    userId:
                      type: integer
                      format: int64
                    username:
                      type: string
                    volumeName:
                      type: string
                    volumeId:
                      type: integer
                      format: int64
  
  /ilastik-task-history:
    get:
      summary: Retrieves user's history of Ilastik tasks
      operationId: getIlastikUserTaskHistory
      tags:
        - Ilastik
      responses:
        '200':
            description: User's history of Ilastik tasks.
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - volumeName
                    - volumeId
                    - taskStatus
                    - logFileName
                  properties:
                    volumeName:
                      type: string
                    volumeId:
                      type: integer
                      format: int64
                    taskStatus:
                      type: string
                    logFile:
                      type: string
  
  /volume/{idVolume}/queue-pseudo-label-generation:
    post:
      summary: Queues Ilastik presudo label generation
      operationId: queuePseudoLabelsGeneration
      tags:
        - Ilastik
      parameters:
        - $ref: '#/components/parameters/idVolume'
      responses:
        '204':
            description: Operation queued successfuly.

  /nanooetzi-task-queue:
    get:
      summary: Retrieves current Nanooetzi task queue
      operationId: getNanoOetziTaskQueue
      tags:
        - Nanooetzi
      responses:
        '200':
            description: Nanooetzi task queue.
            content:
              application/json:
                schema:
                  oneOf:
                    - $ref: '#/components/schemas/NanooetziInferenceTask'
                    - $ref: '#/components/schemas/NanooetziTrainingTask'
  
  /nanooetzi-task-history:
    get:
      summary: Retrieves user's history of Nanooetzi tasks
      operationId: getNanoOetziUserTaskHistory
      tags:
        - Nanooetzi
      responses:
        '200':
            description: User's history of Nanooetzi tasks.
            content:
              application/json:
                schema:
                 oneOf:
                  - $ref: '#/components/schemas/NanooetziInferenceHistory'
                  - $ref: '#/components/schemas/NanooetziTrainingHistory'

  /queue-inference:
    post:
      summary: Queue Nanooetzi inference task.
      operationId: queueInferenceNanooetzi
      tags:
        - Nanooetzi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - checkpointId
              - volumeId
              properties:
                checkpointId:
                  type: integer
                  format: int64
                volumeId:
                  type: integer
                  format: int64
      responses:
        '204':
            description: Inference task successfuly queued.

  /queue-training:
    post:
      summary: Queue Nanooetzi inference task.
      operationId: queueTrainingNanooetzi
      tags:
        - Nanooetzi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - modelId
              - trainingVolumes
              - validationVolumesIds
              - testingVolumesIds
              properties:
                modelId:
                  type: integer
                  format: int64
                trainingVolumes:
                  description: An array of training volume ids.
                  type: array
                  items:
                    type: string
                validationVolumesIds:
                  description: An array of validation volume ids.
                  type: array
                  items:
                    type: string
                testingVolumesIds:
                  description: An array of testing volume ids.
                  type: array
                  items:
                    type: string
      responses:
        '204':
            description: Training task successfuly queued.


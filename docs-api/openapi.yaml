openapi: 3.0.0
info:
  title: Vol-Web
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local Server

security:
  - express-session: []

paths:
  /login:
    post:
      summary: Login
      operationId: login
      tags:
        - User
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "204":
          description: Login successful.
        "401":
          description: Login failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    
  /logout:
    post:
      summary: Logout
      operationId: logout
      tags:
        - User
      security: []
      responses:
        "204":
          description: Logout successful.

  /projects:
    get:
      summary: List of all user projects
      operationId: getProjects
      tags:
        - Project
      responses:
        "200":
          description: An array of user's projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      summary: Create a new project
      operationId: createProject
      tags:
        - Project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    
    
  /project/{idProject}:
    get:
      summary: Detailed info about a project.
      operationId: getProjectById
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '200':
          description: Requested project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Deletes a project.
      operationId: deleteProject
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/idProject'
      responses:
        '204':
          description: Project successfuly deleted.
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /project/{idProject}/volumes:
    post:
      summary: Create a new volume
      operationId: createVolume
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created Volume.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Volume'

  /project/{idProject}/volume/{idVolume}:
    delete:
      summary: Removes volume from project. If volume is no longer part of any project, it is deleted.
      operationId: removeVolumeFromProject
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      responses:
        '204':
          description: Volume successfuly removed from project.

  /project/{idProject}/volume/{idVolume}/raw-data/upload:
    put:
      summary: Upload raw volume data
      operationId: uploadRawData
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      requestBody:
        required: true
        content:
          multipart/form-data:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: string
                      format: binary
                    description: Multiple files of type .zip, .raw, or .json
      responses:
        '200':
          description: Updated raw data volume.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawData"

  /project/{idProject}/volume/{idVolume}/raw-data/upload-mrc:
    put:
      summary: Uploads mrc volume data
      operationId: uploadMrcRawData
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: A single .mrc file.

      responses:
        '200':
          description: Updated raw data volume.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawData"

  /project/{idProject}/volume/{idVolume}/add-sparse-label-volume:
    put:
      summary: Add sparse label volume
      operationId: addSparseLabelVolume
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      responses:
        '201':
          description: Created sparse label volume.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SparseLabelVolumeData"

  /project/{idProject}/volume/{idVolume}/add-pseudo-label-volume:
    put:
      summary: Add pseudo label volume
      operationId: addPseudoLabelVolume
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      responses:
        '201':
          description: Created pseudo label volume.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PseudoLabelVolumeData"

  /project/{idProject}/volume/{idVolume}/add-annotations:
    put:
      summary: Add annotations and convert them to sparse label volume
      operationId: addAnnotations
      tags:
        - Volume
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                annotations:
                  type: object
                  description: A JSON object containing annotation data.

      responses:
        '201':
          description: Created sparse label volume.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SparseLabelVolumeData"

  /project/{idProject}/volume/{idVolume}/volumeData/:type/{idVolumeData}/upload-files:
    put:
      summary: Upload volume data files
      operationId: uploadFiles
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idVolumeData'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Multiple files of type .zip, .raw, or .json

      responses:
        '200':
          description: Updated raw data.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RawData"
                  - $ref: "#/components/schemas/SparseLabelVolumeData"
                  - $ref: "#/components/schemas/PseudoLabelVolumeData"
    
  /project/{idProject}/volume/{idVolume}/volumeData/:type/{idVolumeData}/download-full:
    get:
      summary: Download volume data
      operationId: downloadVolumeData
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing all volume data files.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /project/{idProject}/volume/{idVolume}/volumeData/:type/{idVolumeData}/download-raw-file:
    get:
      summary: Download raw volume file in volume data 
      operationId: downloadVolumeDataRawFile
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing raw file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string
  
  /project/{idProject}/volume/{idVolume}/volumeData/:type/{idVolumeData}/download-settings-file:
    get:
      summary: Download settings file in volume data 
      operationId: downloadVolumeDataSettingsFile
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing settings file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /project/{idProject}/volume/{idVolume}/volumeData/:type/{idVolumeData}/download-mrc-file:
    get:
      summary: Download mrc file in volume data 
      operationId: downloadVolumeDataMrcFile
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '200':
          description: ZIP file containing MRC file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /project/{idProject}/volume/{idVolume}/volumeData/:type/{idVolumeData}:
    delete:
      summary: Removes volume data from volume. If volume data is no longer referenced anywhere else, it is deleted.
      operationId: removeVolumeDataFromProject
      tags:
        - Volume Data
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idVolumeData'
      responses:
        '204':
          description: Volume data successfuly removed from volume.

  /project/{idProject}/models:
    post:
      summary: Create a new model
      operationId: createModel
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created Model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'

  /project/{idProject}/model/{idModel}:
    delete:
      summary: Removes model from project. If model is no longer part referenced anywhere, it is deleted.
      operationId: removeModelFromProject
      tags:
        - Model
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idModel'
      responses:
        '204':
          description: Model successfuly removed from project.

  /project/{idProject}/model/{idModel}/checkpoints:
    post:
      summary: Create a new checkpoint
      operationId: createCheckpoint
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idModel'
      requestBody:
        required: true
        content:
         multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more files of type .ckpt
      responses:
        '201':
          description: Created Checkpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoint'

  /project/{idProject}/model/{idModel}/checkpoint/{idCheckpoint}/download:
    get:
      summary: Download mrc file in volume data 
      operationId: downloadCheckpoint
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idModel'
        - $ref: '#/components/parameters/idCheckpoint'
      responses:
        '200':
          description: ZIP file containing checkpoint file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /project/{idProject}/model/{idModel}/checkpoint/{idCheckpoint}:
    delete:
      summary: Removes checkpoint from model. If model is no longer referenced anywhere, it is deleted.
      operationId: removeCheckpointFromModel
      tags:
        - Checkpoint
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idModel'
        - $ref: '#/components/parameters/idCheckpoint'
      responses:
        '204':
           description: Checkpoint successfuly removed from model.

  /project/{idProject}/volume/{idVolume}/result/{idResult}/download:
    get:
      summary: Download result files
      operationId: downloadResult
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idResult'
      responses:
        '200':
          description: ZIP file containing result files.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /project/{idProject}/volume/{idVolume}/result/{idResult}/download/{fileIndex}:
    get:
      summary: Download a specific result file
      operationId: downloadResultFile
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idResult'
        - name: fileIndex
          in: path
          required: true
          schema:
              type: integer
      responses:
        '200':
          description: ZIP file containing a result file.
          content:
            application/zip:
              schema:
                $ref: '#/components/schemas/ZipFile'
          headers:
            Content-Disposition:
              description: Indicates that the response should be downloaded as an attachment.
              schema:
                type: string

  /project/{idProject}/volume/{idVolume}/result/{idResult}:
    delete:
      summary: Removes result from the volume. If the result is no longer referenced anywhere, it is deleted.
      operationId: removeResultFromVolume
      tags:
        - Result
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
        - $ref: '#/components/parameters/idResult'
      responses:
        '204':
            description: Result successfuly removed from volume.

  /ilastik-task-queue:
    get:
      summary: Retrieves current Ilastik task queue
      operationId: getIlastikTaskQueue
      tags:
        - Ilastik
      responses:
        '200':
            description: Ilastik task queue.
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - userId
                    - username
                    - volumeName
                    - volumeId
                  properties:
                    userId:
                      type: integer
                      format: int64
                    username:
                      type: string
                    volumeName:
                      type: string
                    volumeId:
                      type: integer
                      format: int64
  
  /ilastik-task-history:
    get:
      summary: Retrieves user's history of Ilastik tasks
      operationId: getIlastikUserTaskHistory
      tags:
        - Ilastik
      responses:
        '200':
            description: User's history of Ilastik tasks.
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - volumeName
                    - volumeId
                    - taskStatus
                    - logFileName
                  properties:
                    volumeName:
                      type: string
                    volumeId:
                      type: integer
                      format: int64
                    taskStatus:
                      type: string
                    logFile:
                      type: string
  
  /project/{idProject}/volume/{idVolume}/create-pseudo-labels:
    post:
      summary: Queues Ilastik presudo label generation
      operationId: queuePseudoLabelsGeneration
      tags:
        - Ilastik
      parameters:
        - $ref: '#/components/parameters/idProject'
        - $ref: '#/components/parameters/idVolume'
      responses:
        '204':
            description: Operation queued successfuly.

  /nanooetzi-task-queue:
    get:
      summary: Retrieves current Nanooetzi task queue
      operationId: getNanoOetziTaskQueue
      tags:
        - Nanooetzi
      responses:
        '200':
            description: Nanooetzi task queue.
            content:
              application/json:
                schema:
                  oneOf:
                    - $ref: '#/components/schemas/NanooetziInferenceTask'
                    - $ref: '#/components/schemas/NanooetziTrainingTask'
  
  /nanooetzi-task-history:
    get:
      summary: Retrieves user's history of Nanooetzi tasks
      operationId: getNanoOetziUserTaskHistory
      tags:
        - Nanooetzi
      responses:
        '200':
            description: User's history of Nanooetzi tasks.
            content:
              application/json:
                schema:
                 oneOf:
                  - $ref: '#/components/schemas/NanooetziInferenceHistory'
                  - $ref: '#/components/schemas/NanooetziTrainingHistory'

  /project/{idProject}/queue-inference:
    post:
      summary: Queue Nanooetzi inference task.
      operationId: queueInferenceNanooetzi
      tags:
        - Nanooetzi
      parameters:
        - $ref: '#/components/parameters/idProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - checkpointId
              - volumeId
              properties:
                checkpointId:
                  type: integer
                  format: int64
                volumeId:
                  type: integer
                  format: int64
      responses:
        '204':
            description: Inference task successfuly queued.

  /project/{idProject}/queue-training:
    post:
      summary: Queue Nanooetzi inference task.
      operationId: queueTrainingNanooetzi
      tags:
        - Nanooetzi
      parameters:
        - $ref: '#/components/parameters/idProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - modelId
              - trainingVolumes
              - validationVolumesIds
              - testingVolumesIds
              properties:
                modelId:
                  type: integer
                  format: int64
                trainingVolumes:
                  description: An array of training volume ids.
                  type: array
                  items:
                    type: string
                validationVolumesIds:
                  description: An array of validation volume ids.
                  type: array
                  items:
                    type: string
                testingVolumesIds:
                  description: An array of testing volume ids.
                  type: array
                  items:
                    type: string
      responses:
        '204':
            description: Training task successfuly queued.

components:
  schemas:
    Project:
      $ref: "./schemas/Project.yaml"
    Volume:
      $ref: "./schemas/Volume.yaml#/Volume"
    RawData:
      $ref: "./schemas/RawData.yaml"
    SparseLabelVolumeData:
      $ref: "./schemas/SparseLabelVolumeData.yaml"
    PseudoLabelVolumeData:
      $ref: "./schemas/PseudoLabelVolumeData.yaml"
    Model:
      $ref: "./schemas/Model.yaml"
    Checkpoint:
      $ref: "./schemas/Checkpoint.yaml"
    NanooetziInferenceTask:
      $ref: "./schemas/Nanooetzi.yaml#/InferenceTask"
    NanooetziTrainingTask:
      $ref: "./schemas/Nanooetzi.yaml#/TrainingTask"
    NanooetziInferenceHistory:
      $ref: "./schemas/Nanooetzi.yaml#/InferenceHistory"
    NanooetziTrainingHistory:
      $ref: "./schemas/Nanooetzi.yaml#/TrainingHistory"
    Error:
      $ref: "./schemas/Error.yaml"
    ZipFile:
      type: string
      format: binary
      description: The binary data of the ZIP file.
      example: download.zip
  parameters:
    idProject:
      name: idProject
      in: path
      required: true
      schema:
          type: integer
    idVolume:
      name: idVolume
      in: path
      required: true
      schema:
          type: integer
    idVolumeData:
      name: idVolumeData
      in: path
      required: true
      schema:
          type: integer
    idModel:
      name: idModel
      in: path
      required: true
      schema:
          type: integer
    idCheckpoint:
      name: idCheckpoint
      in: path
      required: true
      schema:
          type: integer
    idResult:
      name: idResult
      in: path
      required: true
      schema:
          type: integer
  securitySchemes:
    express-session:
      type: apiKey
      in: cookie
      name: connect.sid
